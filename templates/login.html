<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netad // Secure Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg-canvas: #010409; 
            --bg-surface: rgba(13, 17, 23, 0.8);
            --border: #30363d; 
            --accent: #a78bfa; 
            --text-main: #c9d1d9;
            --radius: 12px;
        }

        body { 
            background-color: var(--bg-canvas); 
            font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh;
            margin: 0; overflow: hidden; position: relative;
        }

        /* ───── BACKGROUND ANIMATION: FLOATING DATA ───── */
        .particle-container {
            position: absolute; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #11151c 0%, var(--bg-canvas) 100%);
            overflow: hidden;
        }

        .particle-container::before {
            content: ""; position: absolute; inset: 0;
            background-image: radial-gradient(var(--border) 0.5px, transparent 0.5px);
            background-size: 32px 32px;
            opacity: 0.4;
        }

        .dot {
            position: absolute; width: 2px; height: 2px;
            background: var(--accent); border-radius: 50%;
            opacity: 0;
            animation: drift var(--d) linear infinite;
        }

        @keyframes drift {
            0% { transform: translateY(105vh); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        /* ───── GLASSMORPHISM LOGIN CARD ───── */
        .utility-card {
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            width: 100%; max-width: 360px;
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .card-header { background: rgba(22, 27, 34, 0.4); border-bottom: 1px solid var(--border); padding: 32px 24px; text-align: center; }

        /* ───── INPUT VISIBILITY FIX ───── */
        input { 
            background: rgba(1, 4, 9, 0.7) !important; 
            border: 1px solid var(--border); 
            color: var(--text-main) !important; /* Fixed: Text will now be visible */
            font-family: 'JetBrains Mono', monospace; 
            transition: all 0.2s; 
        }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.1); }
        input:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-deploy { 
            background: var(--accent); color: #000; font-weight: 800; font-size: 11px;
            text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s;
        }
        .btn-deploy:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
        .btn-deploy:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        
        #attempt-bar { transition: width 0.5s ease; }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } }
    </style>
</head>
<body>

    <div class="particle-container" id="particles"></div>

    <div id="auth-box" class="utility-card">
        <div class="card-header">
            <div class="w-12 h-12 bg-black/40 border border-border rounded-xl flex items-center justify-center mx-auto mb-4">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <h1 class="text-white text-lg font-bold tracking-tight">Netad Console</h1>
            <div class="flex items-center justify-center gap-2 mt-1">
                <span id="pulse-dot" class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                <p id="status-text" class="text-[9px] font-mono text-zinc-500 uppercase tracking-widest">pipeline_active</p>
            </div>
        </div>

        <div class="p-8">
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-zinc-500 uppercase mb-2 block tracking-widest">Identity</label>
                    <input type="text" id="username" class="w-full rounded-lg px-3 py-2.5 text-xs" placeholder="operator_id" required>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-zinc-500 uppercase mb-2 block tracking-widest">Security Key</label>
                    <input type="password" id="password" class="w-full rounded-lg px-3 py-2.5 text-xs" placeholder="••••••••" required>
                </div>

                <div class="space-y-2">
                    <div id="error-msg" class="text-[9px] text-rose-500 font-bold text-center min-h-[14px] uppercase font-mono tracking-tighter"></div>
                    <div class="w-full bg-black h-1 rounded-full overflow-hidden border border-border">
                        <div id="attempt-bar" class="bg-rose-500 h-full" style="width: 0%"></div>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="btn-deploy w-full py-4 rounded-lg">Authorize Access</button>
            </form>

            <div id="admin-notice" class="hidden mt-6 pt-6 border-t border-border text-center">
                <p id="cooldown-timer" class="text-[10px] text-rose-500 font-bold font-mono mb-2"></p>
                <a href="mailto:admin@netad.com" class="text-[10px] text-accent font-bold uppercase hover:underline mt-2 block">Request Override</a>
            </div>
        </div>
    </div>

    <script>
        // 1. Generate Floating Dots
        const container = document.getElementById('particles');
        for (let i = 0; i < 35; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.left = `${Math.random() * 100}%`;
            dot.style.setProperty('--d', `${10 + Math.random() * 20}s`);
            dot.style.animationDelay = `${Math.random() * 20}s`;
            dot.appendChild(document.createTextNode(''));
            container.appendChild(dot);
        }

        // 2. Full Login Logic
        const form = document.getElementById('login-form'), authBox = document.getElementById('auth-box'),
              err = document.getElementById('error-msg'), btn = document.getElementById('submit-btn'),
              inputs = document.querySelectorAll('input'), adminNotice = document.getElementById('admin-notice'),
              statusText = document.getElementById('status-text'), pulseDot = document.getElementById('pulse-dot'),
              attemptBar = document.getElementById('attempt-bar'), timerText = document.getElementById('cooldown-timer');

        let attempts = parseInt(localStorage.getItem('netad_attempts')) || 0;
        const MAX_ATTEMPTS = 5;
        const COOLDOWN_SECONDS = 30;

        window.onload = () => {
            attemptBar.style.width = `${(attempts / MAX_ATTEMPTS) * 100}%`;
            const lockoutTime = localStorage.getItem('netad_lockout_expiry');
            if (lockoutTime && Date.now() < lockoutTime) {
                startCooldown(Math.ceil((lockoutTime - Date.now()) / 1000));
            }
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.innerText = "AUTHORIZING...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.removeItem('netad_attempts');
                    localStorage.removeItem('netad_lockout_expiry');
                    window.location.href = "/";
                } else {
                    attempts++;
                    localStorage.setItem('netad_attempts', attempts);
                    authBox.classList.add('shake');
                    setTimeout(() => authBox.classList.remove('shake'), 400);
                    attemptBar.style.width = `${(attempts / MAX_ATTEMPTS) * 100}%`;

                    if (attempts >= MAX_ATTEMPTS) {
                        const expiry = Date.now() + (COOLDOWN_SECONDS * 1000);
                        localStorage.setItem('netad_lockout_expiry', expiry);
                        startCooldown(COOLDOWN_SECONDS);
                    } else {
                        err.innerText = "INVALID_CREDENTIALS";
                        btn.innerText = "Authorize Access"; btn.disabled = false;
                    }
                }
            } catch (f) { err.innerText = "NETWORK_ERROR"; btn.disabled = false; }
        });

        function startCooldown(seconds) {
            inputs.forEach(i => i.disabled = true);
            btn.disabled = true;
            btn.innerText = "LOCKED";
            adminNotice.classList.remove('hidden');
            statusText.innerText = "THREAT_DETECTED // LOCKOUT";
            statusText.style.color = "#f85149";
            pulseDot.classList.replace('bg-emerald-500', 'bg-rose-500');

            let timeLeft = seconds;
            const timer = setInterval(() => {
                timerText.innerText = `RETRY_IN_${timeLeft}S`;
                timeLeft--;
                if (timeLeft < 0) {
                    clearInterval(timer);
                    resetAuth();
                }
            }, 1000);
        }

        function resetAuth() {
            localStorage.removeItem('netad_attempts');
            localStorage.removeItem('netad_lockout_expiry');
            attempts = 0;
            inputs.forEach(i => i.disabled = false);
            btn.disabled = false;
            btn.innerText = "Authorize Access";
            attemptBar.style.width = "0%";
            adminNotice.classList.add('hidden');
            err.innerText = "";
            statusText.innerText = "pipeline_active";
            statusText.style.color = "#8b949e";
            pulseDot.classList.replace('bg-rose-500', 'bg-emerald-500');
        }
    </script>
</body>
</html>
