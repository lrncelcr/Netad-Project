<script>
    const form = document.getElementById('login-form');
    const container = document.getElementById('login-container');
    const errorArea = document.getElementById('error-msg');
    const attemptBar = document.getElementById('attempt-bar');
    const btn = document.getElementById('submit-btn'); // Moved outside to access easily
    const maxAttempts = 5;
    let localFailCount = 0;

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        btn.innerText = "Verifying...";
        btn.disabled = true;

        const payload = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if (data.success) {
                window.location.href = "/"; 
            } else {
                localFailCount++;
                errorArea.innerText = data.message;
                
                // Update the bar
                const progress = Math.min((localFailCount / maxAttempts) * 100, 100);
                attemptBar.style.width = `${progress}%`;

                // 🛑 FRONTEND LOCKOUT CHECK
                // If they hit 5 attempts OR the server says "Account locked"
                if (localFailCount >= maxAttempts || data.message.includes("locked")) {
                    errorArea.innerText = "SECURITY ALERT: Access Denied (Locked)";
                    btn.innerText = "LOCKED";
                    btn.classList.replace('bg-[#2ECC71]', 'bg-[#333]'); // Change green to gray
                    btn.disabled = true; // Stay disabled
                    return; 
                }

                // Shake Animation
                container.classList.remove('shake');
                void container.offsetWidth; 
                container.classList.add('shake');

                btn.innerText = "Sign In";
                btn.disabled = false;
            }
        } catch (err) {
            errorArea.innerText = "Connection error. Is app.py running?";
            btn.innerText = "Sign In";
            btn.disabled = false;
        }
    });
</script>
