<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netad - Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { 
            background-color: #0A0A0A; 
            color: #CCCCCC; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
        }

        .login-card { 
            background-color: #111111; 
            border: 1px solid #1E1E1E; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        input { 
            background-color: #1A1A1A; 
            border: 1px solid #1E1E1E; 
            color: #CCCCCC; 
            transition: all 0.2s ease;
        }

        input:focus { 
            border-color: #2ECC71; 
            background-color: #222;
            outline: none; 
            box-shadow: 0 0 0 2px rgba(46, 204, 113, 0.2);
        }

        /* Shake Animation for Failed Logins */
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">

    <div id="login-container" class="w-full max-w-md text-center">
        <div class="mb-8">
            <div class="text-5xl mb-4">🔒</div>
            <h1 class="text-4xl font-black tracking-tighter text-[#2ECC71]">NETAD</h1>
            <p class="text-xs text-[#555555] uppercase tracking-widest mt-1">CCTV Security Management</p>
        </div>

        <div class="login-card rounded-2xl p-8 text-left">
            <h2 class="text-lg font-bold mb-6 text-center text-zinc-300">Sign In to Dashboard</h2>
            
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-[10px] font-bold text-[#555555] uppercase mb-1">Username</label>
                    <input type="text" id="username" class="w-full rounded-lg px-4 py-3 text-sm" placeholder="Enter username" required autocomplete="off">
                </div>
                
                <div>
                    <label class="block text-[10px] font-bold text-[#555555] uppercase mb-1">Password</label>
                    <input type="password" id="password" class="w-full rounded-lg px-4 py-3 text-sm" placeholder="Enter password" required>
                </div>

                <div id="error-msg" class="text-center text-[#E74C3C] text-xs font-medium min-h-[1.2rem]"></div>

                <div class="w-full bg-[#222] h-1.5 rounded-full overflow-hidden">
                    <div id="attempt-bar" class="bg-[#E74C3C] h-full transition-all duration-500" style="width: 0%"></div>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-[#2ECC71] text-[#000] font-black py-3 rounded-lg hover:bg-[#27AE60] transition-all text-sm uppercase active:scale-95">
                    Sign In
                </button>
            </form>
        </div>

        <p class="mt-8 text-[10px] text-[#444] px-10 leading-relaxed">
            ⚠ Unauthorized access is prohibited and actively monitored by the Netad Intrusion Detection System.
        </p>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const container = document.getElementById('login-container');
        const errorArea = document.getElementById('error-msg');
        const attemptBar = document.getElementById('attempt-bar');
        const btn = document.getElementById('submit-btn');
        
        const maxAttempts = 5;
        let localFailCount = 0;

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI Feedback: Loading
            btn.innerText = "VERIFYING...";
            btn.disabled = true;
            errorArea.innerText = "";

            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();

                if (data.success) {
                    // Success: Send to main dashboard
                    window.location.href = "/"; 
                } else {
                    // Handle Failure
                    localFailCount++;
                    errorArea.innerText = data.message;
                    
                    // Update Security Bar
                    const progress = Math.min((localFailCount / maxAttempts) * 100, 100);
                    attemptBar.style.width = `${progress}%`;

                    // 🛑 FRONTEND LOCKOUT CHECK
                    if (localFailCount >= maxAttempts || data.message.includes("locked")) {
                        errorArea.innerText = "SECURITY ALERT: ACCESS DENIED (LOCKED)";
                        btn.innerText = "SYSTEM LOCKED";
                        btn.classList.replace('bg-[#2ECC71]', 'bg-[#333]'); 
                        btn.classList.add('text-zinc-500');
                        btn.disabled = true;
                        return; 
                    }

                    // Trigger Shake Animation
                    container.classList.remove('shake');
                    void container.offsetWidth; // Trigger DOM reflow
                    container.classList.add('shake');

                    // Reset button for next try
                    btn.innerText = "Sign In";
                    btn.disabled = false;
                }
            } catch (err) {
                console.error("Login Error:", err);
                errorArea.innerText = "CONNECTION ERROR: Server is unreachable.";
                btn.innerText = "Sign In";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
